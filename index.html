<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>服務暫時中斷</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>出了點問題</h1>
        <p>目前服務暫時無法使用，正在努力修復中</p>
        <p class="sub">我們正在盡快解決此問題，感謝您的耐心等待</p>
        <p>預計恢復：<span id="time">15</span> 秒</p>
        
        <div class="bar">
            <div class="progress" id="progress"></div>
        </div>

        <script src="script.js"></script>
    </div>
    
</body>
</html>
